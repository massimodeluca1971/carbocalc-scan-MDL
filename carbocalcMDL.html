<title>CarbOCalc — Omnipod 5</title>
<style>
:root{
  --green:#1A9E6E;
  --green-dark:#0D7A54;
  --green-light:#E2F7EF;
  --green-mid:#5EC99A;
  --lav-bg:#EAE4F6;
  --lav-card:#F4F0FC;
  --lav-border:#C8BBEA;
  --lav-deep:#6B4FA8;
  --lav-mid:#9880CC;
  --lav-light:#EDE8F8;
  --amber:#B86E0A;
  --amber-light:#FEF3E2;
  --blue:#185FA5;
  --blue-light:#E6F1FB;
  --red:#D94040;
  --text:#1E1A2E;
  --sub:#7A7090;
  --card:#FFFFFF;
  --border:#DDD6F0;
  --bg:var(--lav-bg);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --lav-bg:#1A1525;--lav-card:#241E35;--lav-border:#3D3460;
    --lav-deep:#A07FE0;--lav-mid:#7860B8;--lav-light:#2A2240;
    --card:#2A2240;--border:#3D3460;--bg:#1A1525;
    --text:#F0EAF8;--sub:#9A8FBB;--green-light:#0D3D2A;
    --amber-light:#2A1C04;--blue-light:#0A1F38;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;overflow:hidden}
#root{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg)}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:0.5px solid var(--border);
  padding:calc(var(--safe-top) + 12px) 16px 12px;flex-shrink:0;z-index:20;
  box-shadow:0 1px 8px rgba(107,79,168,.08)}
.topbar-brand{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.brand-name{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--lav-deep)}
.brand-badge{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:10px;
  background:var(--lav-light);color:var(--lav-deep);font-weight:700;letter-spacing:.04em}
.search-row{display:flex;gap:8px}
.search-input-wrap{flex:1;position:relative;display:flex;align-items:center;align-self:stretch}
.search-input-wrap .search-input{width:100%}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:22px;height:22px;border-radius:50%;border:none;background:var(--sub);
  color:var(--card);font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;flex-shrink:0}
.search-clear:active{background:var(--lav-deep)}
.search-input{flex:1;padding:12px 14px;font-size:16px;border:1.5px solid var(--lav-border);
  border-radius:14px;background:var(--lav-light);color:var(--text);outline:none;
  -webkit-appearance:none;transition:border-color .15s,box-shadow .15s}
.search-input:focus{border-color:var(--lav-deep);background:var(--card);
  box-shadow:0 0 0 3px rgba(107,79,168,.12)}
.search-btn{padding:12px 20px;border-radius:14px;border:none;
  background:var(--green);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;white-space:nowrap}
.search-btn:active{opacity:.85;transform:scale(.97)}
.search-btn:disabled{background:var(--green-mid);cursor:default}

/* AUTOCOMPLETE */
.suggestions-box{position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--card);border:1.5px solid var(--lav-border);border-radius:14px;
  box-shadow:0 8px 24px rgba(107,79,168,.18);z-index:100;overflow:hidden;
  max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.suggestions-box::-webkit-scrollbar{display:none}
.sug-item{padding:11px 14px;display:flex;align-items:center;gap:10px;
  cursor:pointer;border-bottom:0.5px solid var(--border)}
.sug-item:last-child{border-bottom:none}
.sug-item:active{background:var(--lav-light)}
.sug-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.sug-cho{font-size:12px;font-weight:700;color:var(--green-dark);
  background:var(--green-light);padding:2px 7px;border-radius:7px;white-space:nowrap}
.sug-gi{font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px;white-space:nowrap}
.source-tabs{display:flex;gap:6px;margin-top:10px}
.stab{flex:1;padding:7px;border-radius:10px;border:1px solid var(--border);
  background:var(--lav-light);font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;text-align:center}
.stab.active{background:var(--lav-light);border-color:var(--lav-deep);color:var(--lav-deep)}

/* BOTTOM NAV */
.bottomnav{display:flex;background:var(--card);border-top:0.5px solid var(--border);
  padding-bottom:var(--safe-bot);flex-shrink:0;z-index:20;
  box-shadow:0 -1px 8px rgba(107,79,168,.07)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;gap:3px;cursor:pointer;border:none;background:transparent;
  color:var(--sub);font-size:10px;font-weight:700;letter-spacing:.04em}
.bnav-btn.active{color:var(--lav-deep)}
.bnav-btn.active svg{stroke:var(--lav-deep)}
.bnav-icon{width:24px;height:24px;position:relative}
.bnav-badge{position:absolute;top:-4px;right:-6px;min-width:16px;height:16px;
  border-radius:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 3px}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px}
.cat-card{background:var(--card);border-radius:16px;border:1px solid var(--border);
  padding:14px 14px 12px;cursor:pointer;transition:transform .1s,border-color .1s;
  display:flex;flex-direction:column;gap:6px}
.cat-card:active{transform:scale(.96)}
.cat-card:hover{border-color:var(--lav-mid)}
.cat-emoji{font-size:28px;line-height:1}
.cat-name{font-size:13px;font-weight:700;color:var(--text)}
.cat-count{font-size:11px;color:var(--sub)}

/* FOOD CARDS */
.section-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--sub);
  padding:12px 16px 6px;text-transform:uppercase}
.food-card{background:var(--card);margin:0 16px 8px;border-radius:14px;
  border:1px solid var(--border);padding:13px 14px;cursor:pointer;transition:border-color .1s,transform .1s}
.food-card:active{transform:scale(.98)}
.food-card.selected{border:2px solid var(--green);background:var(--green-light)}
.food-card.selected .fc-name{color:var(--green-dark)}
.fc-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.3}
.fc-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px}
.b-cho{background:var(--green-light);color:var(--green-dark)}
.b-sug{background:var(--blue-light);color:var(--blue)}
.b-fib{background:var(--lav-light);color:var(--lav-deep)}
.b-src-crea{background:var(--green-light);color:var(--green-dark);margin-left:auto}
.b-src-usda{background:var(--amber-light);color:var(--amber);margin-left:auto}
.b-src-custom{background:var(--lav-light);color:var(--lav-deep);margin-left:auto}
.b-gi-low{background:#E2F7EF;color:#0D7A54;border:1px solid #5EC99A}
.b-gi-mid{background:#FEF3E2;color:#B86E0A;border:1px solid #E09020}
.b-gi-high{background:#FDEAEA;color:#D94040;border:1px solid #E08080}
@media(prefers-color-scheme:dark){
  .b-gi-low{background:#0D3D2A;color:#5EC99A;border-color:#1A6040}
  .b-gi-mid{background:#2A1C04;color:#E0A050;border-color:#704010}
  .b-gi-high{background:#2D1212;color:#E08080;border-color:#703030}
}

/* RESULT PANEL */
.result-panel{background:var(--card);border-top:1px solid var(--border);
  padding:14px 16px 14px;flex-shrink:0;z-index:10;
  box-shadow:0 -2px 12px rgba(107,79,168,.08);
  max-height:52vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.result-panel::-webkit-scrollbar{display:none}
.sel-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sel-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;flex:1}
.quick-row{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px}
.quick-row::-webkit-scrollbar{display:none}
.qbtn{padding:7px 11px;border-radius:9px;border:1px solid var(--border);
  background:var(--lav-light);color:var(--text);font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0}
.qbtn:active{transform:scale(.95)}
.qbtn.active{background:var(--lav-deep);border-color:var(--lav-deep);color:#fff}
.gram-row{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.gram-lbl{font-size:12px;color:var(--sub);flex-shrink:0}
.gram-steppers{display:flex;align-items:center;gap:5px;flex:1}
.gram-step-group{display:flex;gap:4px}
.gbtn{padding:9px 11px;border-radius:10px;border:1.5px solid var(--lav-border);
  background:var(--lav-light);color:var(--lav-deep);font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;min-width:44px;text-align:center;
  -webkit-tap-highlight-color:transparent}
.gbtn:active{background:var(--lav-deep);color:#fff;border-color:var(--lav-deep);transform:scale(.94)}
.gram-center{display:flex;align-items:center;gap:5px;flex:1;justify-content:center}
.gram-num{width:72px;padding:9px 4px;font-size:20px;font-weight:700;text-align:center;
  border:2px solid var(--lav-border);border-radius:12px;background:var(--lav-light);
  color:var(--text);font-variant-numeric:tabular-nums;outline:none;-webkit-appearance:none}
.gram-num:focus{border-color:var(--lav-deep);background:var(--card)}
.gram-g{font-size:14px;color:var(--sub);font-weight:600}
.metrics-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.met-box{background:var(--lav-light);border-radius:12px;padding:10px 10px 9px;border:1px solid var(--border)}
.met-box.big{background:var(--green-light);border-color:var(--green-mid)}
.met-lbl{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--sub);
  text-transform:uppercase;margin-bottom:3px}
.met-lbl.green{color:var(--green-dark)}
.met-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);line-height:1}
.met-val.green{color:var(--green)}
.met-val.blue{color:var(--blue)}
.met-unit{font-size:12px;font-weight:400;margin-left:1px;color:var(--sub)}
.met-sub{font-size:10px;color:var(--green);margin-top:2px}
.panel-btns{display:flex;gap:8px}
.btn-add{flex:1;padding:14px;border-radius:13px;border:none;
  background:var(--green-dark);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-add:active{opacity:.85;transform:scale(.98)}
.btn-copy{padding:11px 14px;border-radius:13px;border:1px solid var(--border);
  background:var(--lav-light);color:var(--sub);font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.btn-copy:active{opacity:.8;transform:scale(.97)}
.btn-copy.done{background:var(--green-light);border-color:var(--green);color:var(--green-dark)}
.btn-fav{padding:11px 13px;border-radius:13px;border:1px solid var(--border);
  background:var(--lav-light);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.btn-fav:active{transform:scale(.95)}

/* MEAL SCREEN */
.meal-total-card{margin:16px;background:linear-gradient(135deg,var(--lav-deep),var(--green-dark));
  border-radius:20px;padding:22px 20px}
.mt-lbl{font-size:12px;font-weight:700;letter-spacing:.07em;color:rgba(255,255,255,.7);margin-bottom:6px}
.mt-val{font-size:60px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
.mt-unit{font-size:20px;font-weight:400;color:rgba(255,255,255,.8)}
.mt-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:6px}
.mt-bar-wrap{margin-top:14px;background:rgba(255,255,255,.2);border-radius:6px;height:6px;overflow:hidden}
.mt-bar-fill{height:100%;border-radius:6px;background:#fff;transition:width .4s ease}
.mt-actions{display:flex;gap:8px;margin-top:14px}
.mt-btn{flex:1;padding:10px;border-radius:10px;border:none;
  background:rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.mt-btn:active{background:rgba(255,255,255,.3)}
.mt-btn.danger{background:rgba(255,80,80,.25)}
.meal-item{background:var(--card);margin:0 16px 8px;border-radius:14px;
  border:1px solid var(--border);padding:13px 14px;
  display:flex;align-items:center;gap:12px}
.mi-name{flex:1;font-size:14px;font-weight:700;color:var(--text)}
.mi-grams{font-size:12px;color:var(--sub);margin-top:2px}
.mi-cho{font-size:22px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;white-space:nowrap}
.mi-del{width:32px;height:32px;border-radius:50%;border:none;background:var(--lav-light);
  color:var(--sub);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mi-del:active{background:var(--border)}

/* FAV / CUSTOM */
.fav-item,.custom-item{background:var(--card);margin:0 16px 8px;border-radius:14px;
  border:1px solid var(--border);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.fav-item:active,.custom-item:active{transform:scale(.98)}
.fi-info,.ci-info{flex:1}
.fi-name,.ci-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.fi-meta,.ci-meta{font-size:12px;color:var(--sub)}
.fi-star{font-size:20px;cursor:pointer;padding:6px}
.ci-del{width:34px;height:34px;border-radius:50%;border:none;background:var(--lav-light);
  color:var(--sub);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ADD FORM */
.add-form{background:var(--card);margin:0 16px 12px;border-radius:16px;
  border:1px solid var(--border);padding:18px}
.add-form-title{font-size:15px;font-weight:700;color:var(--lav-deep);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.form-field{display:flex;flex-direction:column;gap:5px;flex:1}
.form-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--sub);text-transform:uppercase}
.form-input{padding:11px 12px;font-size:15px;border:1.5px solid var(--border);border-radius:11px;
  background:var(--lav-light);color:var(--text);outline:none;-webkit-appearance:none;width:100%}
.form-input:focus{border-color:var(--lav-deep)}
.form-num{padding:10px 8px;font-size:15px;border:1.5px solid var(--border);border-radius:11px;
  background:var(--lav-light);color:var(--text);outline:none;text-align:center;width:100%;-webkit-appearance:none}
.form-num:focus{border-color:var(--lav-deep)}
.form-hint{font-size:11px;color:var(--sub);text-align:center;margin-top:2px}
.btn-save{width:100%;padding:14px;border-radius:13px;border:none;
  background:var(--lav-deep);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-save:active{opacity:.85;transform:scale(.98)}
.form-error{font-size:12px;color:var(--red);margin-top:-4px;margin-bottom:6px}

/* GI / CG PANEL */
.gi-panel{border-radius:12px;padding:11px 13px;margin-bottom:10px;border:1.5px solid var(--border)}
.gi-panel.gi-green{background:var(--green-light);border-color:var(--green-mid)}
.gi-panel.gi-amber{background:var(--amber-light);border-color:#E09020}
.gi-panel.gi-red{background:#FDEAEA;border-color:#E08080}
@media(prefers-color-scheme:dark){
  .gi-panel.gi-red{background:#2D1212;border-color:#A04040}
}
.gi-header{display:flex;align-items:center;gap:6px;margin-bottom:9px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.gi-header.gi-green{color:var(--green-dark)}
.gi-header.gi-amber{color:var(--amber)}
.gi-header.gi-red{color:var(--red)}
.gi-nums{display:flex;gap:8px;margin-bottom:0}
.gi-box{flex:1;background:rgba(255,255,255,.55);border-radius:9px;padding:8px 10px;text-align:center;border:1px solid rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){.gi-box{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}}
.gi-box-lbl{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--sub);text-transform:uppercase;margin-bottom:2px}
.gi-box-val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;color:var(--text)}
.gi-box-sub{font-size:10px;color:var(--sub);margin-top:2px}
.gi-exp{margin-top:9px;padding:9px 11px;border-radius:10px;background:rgba(107,79,168,.07);border:1px solid var(--lav-border)}
.gi-exp-head{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--lav-deep);text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.gi-exp-row{display:flex;align-items:baseline;gap:6px}
.gi-exp-val{font-size:20px;font-weight:700;color:var(--lav-deep);font-variant-numeric:tabular-nums}
.gi-exp-unit{font-size:12px;color:var(--lav-mid);font-weight:600}
.gi-exp-note{font-size:10px;color:var(--sub);margin-top:5px;line-height:1.45}

/* PROFILO INSULINICO */
.profilo-card{background:var(--card);margin:0 16px 12px;border-radius:16px;

.profilo-title{font-size:15px;font-weight:700;color:var(--lav-deep);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.profilo-subtitle{font-size:11px;color:var(--sub);margin-bottom:16px;line-height:1.45}
.profilo-row{display:flex;gap:10px;margin-bottom:12px;align-items:flex-end}
.profilo-field{display:flex;flex-direction:column;gap:5px;flex:1}
.profilo-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--sub);text-transform:uppercase}
.profilo-icr-wrap{display:flex;align-items:center;gap:6px}
.profilo-icr-prefix{font-size:14px;font-weight:700;color:var(--sub);white-space:nowrap}
.profilo-saved{font-size:12px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:5px;margin-top:4px}
.insulin-type-grid{display:flex;gap:6px;flex-wrap:wrap}
.insulin-chip{padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);

.dose-panel{background:linear-gradient(135deg,rgba(107,79,168,.07),rgba(26,158,110,.06));

.dose-icon{font-size:18px;flex-shrink:0}
.dose-info{flex:1}
.dose-lbl{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:1px}
.dose-desc{font-size:10px;color:var(--sub);line-height:1.3}
.dose-val{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--lav-deep);white-space:nowrap}
.dose-val span{font-size:13px;font-weight:600;color:var(--lav-mid)}
.dose-gi-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;

.dose-delta.up{background:#FDEAEA;color:var(--red)}
.dose-delta.down{background:var(--green-light);color:var(--green-dark)}
.dose-delta.eq{background:var(--lav-light);color:var(--lav-deep)}
@media(prefers-color-scheme:dark){
  .dose-delta.up{background:#3D1212;color:#E08080}
  .dose-delta.down{background:#0D3D2A;color:#5EC99A}
}
.dose-timing{margin-top:9px;padding:8px 10px;border-radius:9px;
  background:rgba(184,110,10,.08);border:1px solid rgba(184,110,10,.25);
  font-size:10px;color:var(--amber);line-height:1.5;font-weight:600}
.dose-no-profile{font-size:12px;color:var(--sub);text-align:center;padding:8px 0;line-height:1.6}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(30,26,46,.5);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:calc(var(--safe-bot) + 90px)}
.confirm-box{background:var(--card);border-radius:20px;padding:22px;
  width:calc(100% - 32px);max-width:400px;text-align:center}
.confirm-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.confirm-sub{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-btn-cancel{flex:1;padding:13px;border-radius:12px;border:1px solid var(--border);
  background:var(--lav-light);color:var(--text);font-size:15px;font-weight:700;cursor:pointer}
.confirm-btn-ok{flex:1;padding:13px;border-radius:12px;border:none;
  background:var(--red);color:#fff;font-size:15px;font-weight:700;cursor:pointer}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px 24px 16px;text-align:center;gap:6px}
.empty-icon{font-size:40px;margin-bottom:4px}
.empty-title{font-size:17px;font-weight:700;color:var(--text)}
.empty-sub{font-size:13px;color:var(--sub);line-height:1.6}
.empty-meal{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 30px;gap:14px;text-align:center}

/* MISC */
.no-results{text-align:center;padding:40px 24px;font-size:14px;color:var(--sub);line-height:1.7}
.section-back{display:flex;align-items:center;gap:8px;padding:12px 16px 4px;cursor:pointer}
.section-back-arrow{font-size:18px;color:var(--lav-deep)}
.section-back-lbl{font-size:13px;font-weight:700;color:var(--lav-deep)}
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;
  transform:translateX(-50%);background:#2A2240;color:#fff;padding:10px 20px;
  border-radius:24px;font-size:14px;font-weight:700;z-index:100;white-space:nowrap;
  animation:fadeup .3s ease,fadedown .3s ease 1.7s forwards}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadedown{from{opacity:1}to{opacity:0}}

function getGI(name){
  // Prima controlla se è un alimento personalizzato con IG salvato
  const customFood=state.custom.find(f=>f.n===name);
  if(customFood&&customFood.gi!=null) return customFood.gi;
  // Poi cerca nel database CREA
  if(GI_DB[name]!==undefined) return GI_DB[name];
  // Fuzzy: cerca il nome più simile nel database
  const nl=name.toLowerCase();
  for(const[k,v] of Object.entries(GI_DB)){
    const kl=k.toLowerCase();
    if(nl===kl||nl.includes(kl)||kl.includes(nl)) return v;
  }
  return null;
}

function giClass(gi){
  if(gi<=55) return 'gi-green';
  if(gi<=69) return 'gi-amber';
  return 'gi-red';
}
function giBadgeClass(gi){
  if(gi<=55) return 'b-gi-low';
  if(gi<=69) return 'b-gi-mid';
  return 'b-gi-high';
}

  if(gi<=55) return '🟢';
  if(gi<=69) return '🟡';
  return '🔴';
}

  if(cg<=10) return 'gi-green';
  if(cg<=19) return 'gi-amber';
  return 'gi-red';
}

  if(gi<=55) return 'basso';

}

  if(gi>=70||cg>=20) return 'Picco glicemico rapido — considera dose o anticipo maggiore';

}

function getInsulinInfo(id){
  return INSULIN_TYPES.find(t=>t.id===id)||INSULIN_TYPES[0];
}

function calcDose(cho_g, icr){
  if(!cho_g||!icr||icr<=0) return null;
  return Math.round((cho_g/icr)*10)/10;
}

function doseTimingMsg(gi, insulinId){
  const ins=getInsulinInfo(insulinId);
  if(gi===null) return ins.note;
  if(gi>=70) return `⏱ IG alto + ${ins.label}: ${ins.note}`;
  if(gi>=56) return `⏱ IG medio + ${ins.label}: ${ins.note}`;
  return `⏱ IG basso + ${ins.label}: ${ins.note}`;
}

function translateToEng(q){
  const t=q.trim().toLowerCase();
  // Cerca corrispondenza esatta prima
  if(ITA_ENG[t]) return ITA_ENG[t];
  // Cerca corrispondenza parziale (prima parola chiave trovata)
  for(const [ita,eng] of Object.entries(ITA_ENG)){
    if(t.includes(ita)||ita.includes(t)) return eng;
  }
  // Nessuna traduzione: usa il termine italiano direttamente
  // (USDA a volte riconosce termini italiani comuni)
  return t;
}


async function fetchUSDA(q){
  state.searching=true;render();
  try{
    const eng=translateToEng(q);
    const u=await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(eng)}&api_key=DEMO_KEY&dataType=Foundation,SR%20Legacy&pageSize=10`);
    const ud=await u.json();
    state.usdaResults=(ud.foods||[]).map(f=>{
      function nn(ids){for(const id of ids){const x=(f.foodNutrients||[]).find(n=>n.nutrientId===id||n.nutrientNumber===String(id));if(x&&x.value!=null)return parseFloat(x.value)||0;}return null;}
      return{n:f.description,c:f.foodCategory||"",cho:nn([1005]),sug:nn([2000,269]),fib:nn([1079]),src:"usda"};
    }).filter(f=>f.cho!=null);
    if(state.usdaResults.length>0) state.srcTab="usda";
  }catch(e){
    state.usdaResults=[];
  }
  state.searching=false;render();
}

function copyCHO(){
  const f=state.selected;if(!f)return;
  const cho=calcFor(f.cho100,state.grams);
  const fib=calcFor(f.fib100,state.grams);
  const net=cho!=null&&fib!=null?Math.max(0,cho-fib):cho;
  const val=fmt(net??cho,1);
  navigator.clipboard.writeText(val).then(()=>{
    state.copied=true;render();
    setTimeout(()=>{state.copied=false;render();},2500);
  }).catch(()=>showToast("Copia manuale: "+val+" g"));
}

function copyMealCHO(){
  const tot=state.meal.reduce((a,i)=>a+(i.netcho??i.cho),0);
  const val=fmt(tot,1);
  navigator.clipboard.writeText(val).then(()=>{
    state.copied=true;render();setTimeout(()=>{state.copied=false;render();},2500);
    showToast("✓ "+val+"g CHO copiati");
  }).catch(()=>showToast("CHO pasto: "+val+"g"));
}

function addToMeal(){
  const f=state.selected;if(!f)return;
  const cho=calcFor(f.cho100,state.grams);
  const fib=calcFor(f.fib100,state.grams);
  const sug=calcFor(f.sug100,state.grams);
  const net=cho!=null&&fib!=null?Math.max(0,cho-fib):cho;
  state.meal.push({name:f.name,grams:state.grams,cho,sug,fib,netcho:net,src:f.src});
  saveToStorage();
  const nome=f.name;
  state.query="";state.creaResults=[];state.usdaResults=[];

}

function saveCustomFood(){
  const f=state.addForm;
  const name=f.name.trim();
  if(!name){
    state.addForm.error="Inserisci il nome dell'alimento.";
    // Mostra errore aggiornando solo il div errore, senza render() completo
    const errEl=document.getElementById('cf-error');
    if(errEl) errEl.textContent=state.addForm.error;
    return;
  }
  const cho=parseFloat(f.cho);
  if(isNaN(cho)||cho<0||cho>100){
    state.addForm.error="Carboidrati non validi (0–100g).";
    const errEl=document.getElementById('cf-error');
    if(errEl) errEl.textContent=state.addForm.error;
    return;
  }
  const sug=parseFloat(f.sug)||0;
  const fib=parseFloat(f.fib)||0;
  const giRaw=(f.gi||'').trim();
  const gi=giRaw===''?null:parseFloat(giRaw);
  if(giRaw!==''&&(isNaN(gi)||gi<0||gi>120)){
    state.addForm.error="Indice Glicemico non valido (0–120, o lascia vuoto).";
    const errEl=document.getElementById('cf-error');
    if(errEl) errEl.textContent=state.addForm.error;
    return;
  }
  if(state.custom.some(c=>c.n.toLowerCase()===name.toLowerCase())){
    state.addForm.error="Hai già un alimento con questo nome.";
    const errEl=document.getElementById('cf-error');
    if(errEl) errEl.textContent=state.addForm.error;
    return;
  }
  state.custom.unshift({n:name,c:state.addForm.cat||'Cereali',cho,sug,fib,...(gi!==null&&{gi})});
  saveToStorage();
  // Reset stato form — mantiene la categoria selezionata per comodità
  const catMemory=state.addForm.cat||'Cereali';
  state.addForm={name:"",cho:"",sug:"",fib:"",gi:"",cat:catMemory,error:""};
  // Pulisce fisicamente i campi nel DOM (non controllati da value=)
  ['cf-name','cf-cho','cf-sug','cf-fib','cf-gi'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  showToast("✓ "+name+" aggiunto"+(gi!==null?` · IG ${gi}`:''));
  render();
}

function removeCustomFood(i){
  const nome=state.custom[i].n;
  state.custom.splice(i,1);
  saveToStorage();
  showToast(nome+" eliminato");

  state.profilo={icr,insulinType:state.profiloForm.insulinType,saved:true};

}







function searchCREA(q){
  const t=q.trim().toLowerCase();
  if(!t)return[];
  const words=t.split(/\s+/);
  const matchFn=f=>{const name=f.n.toLowerCase();return words.every(w=>name.includes(w));};
  const sort=(a,b)=>{
    const aC=!!a.custom,bC=!!b.custom;
    if(aC&&!bC)return-1;if(bC&&!aC)return 1;
    const ai=a.n.toLowerCase().indexOf(t),bi=b.n.toLowerCase().indexOf(t);
    if(ai===0&&bi!==0)return-1;if(bi===0&&ai!==0)return 1;
    return a.n.localeCompare(b.n,'it');
  };
  const creaMapped=CREA.filter(matchFn);
  const customMapped=state.custom.filter(matchFn).map(f=>({...f,custom:true}));
  return[...customMapped,...creaMapped].sort(sort);
}

function catFoods(cat){
  return CREA.filter(f=>cat.keywords.includes(f.c));
}

function fmt(v,d=1){
  if(v==null)return'—';
  const n=parseFloat((v).toFixed(d));
  return n%1===0?String(n):n.toFixed(d);
}
function calcFor(v100,g){if(v100==null)return null;return v100*g/100;}

function loadFromStorage(){
  try{
    const m=localStorage.getItem('cc_meal');
    const f=localStorage.getItem('cc_favs');
    const c=localStorage.getItem('cc_custom');
    const p=localStorage.getItem('cc_profilo');
    if(m)state.meal=JSON.parse(m);
    if(f)state.favs=JSON.parse(f);
    if(c)state.custom=JSON.parse(c);
    if(p){
      const prof=JSON.parse(p);
      state.profilo={icr:prof.icr||6,insulinType:prof.insulinType||'fiasp',saved:true};
      state.profiloForm={icr:String(prof.icr||6),insulinType:prof.insulinType||'fiasp'};
    }
  }catch(e){}
}
function saveToStorage(){
  try{

    localStorage.setItem('cc_custom',JSON.stringify(state.custom));

        // Correttore IG: moltiplicatore sulla dose base (direzione corretta: IG alto → più insulina)

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── HANDLERS ──
function setTab(t){state.tab=t;render();}
function goHome(){
  state.query='';state.creaResults=[];state.usdaResults=[];
  state.selected=null;state.activeCat=null;state.srcTab='crea';
  // Pulisce il campo di ricerca nel DOM (non controllato)
  const si=document.getElementById('si');
  if(si) si.value='';
  render();
}
function setSrcTab(t){
  state.srcTab=t;
  if(t==='usda'&&state.usdaResults.length===0&&!state.searching&&state.query)fetchUSDA(state.query);
  render();
}
function openCat(id){state.activeCat=id;state.selected=null;render();}

function onQueryInput(e){
  state.query=e.target.value;
  state.activeCat=null;
  if(!state.query.trim()){
    state.creaResults=[];state.usdaResults=[];state.selected=null;
    updateSuggestions('');
  } else {
    updateSuggestions(state.query);
  }
  const btn=document.getElementById('sbtn')||document.querySelector('.search-btn');
  if(btn)btn.disabled=!state.query.trim()||state.searching;
}

function updateSuggestions(q){
  const box=document.getElementById('suggestions');
  if(!box) return;
  const t=q.trim();
  if(t.length<2){box.innerHTML='';return;}

  const results=searchCREA(t).slice(0,6);
  if(results.length===0){box.innerHTML='';return;}

  let html='<div class="suggestions-box">';
  results.forEach((f,i)=>{
    const gi=getGI(f.n);
    const giHtml=gi!==null
      ? `<span class="sug-gi ${giBadgeClass(gi)}">${giBadgeEmoji(gi)} ${gi}</span>`
      : '';
    const name=f.n.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // Evidenzia la parte digitata nel nome
    const tLow=t.toLowerCase();
    const nLow=name.toLowerCase();
    const idx=nLow.indexOf(tLow);
    const nameHtml=idx>=0
      ? name.slice(0,idx)+'<strong>'+name.slice(idx,idx+t.length)+'</strong>'+name.slice(idx+t.length)
      : name;
    html+=`<div class="sug-item" ontouchstart="" onclick="selectFromSuggestion(${i})">
      <span class="sug-name">${nameHtml}</span>
      ${giHtml}
      <span class="sug-cho">CHO ${fmt(f.cho)}g</span>
    </div>`;
  });
  html+='</div>';
  box.innerHTML=html;
  // Salva i risultati correnti per selectFromSuggestion
  window._sugResults=results;
}

function selectFromSuggestion(i){
  const f=window._sugResults&&window._sugResults[i];
  if(!f) return;
  // Chiudi suggerimenti
  const box=document.getElementById('suggestions');
  if(box) box.innerHTML='';
  // Aggiorna il campo di testo
  const si=document.getElementById('si');
  if(si) si.value=f.n;
  state.query=f.n;
  // Fai la ricerca completa e seleziona
  const cr=searchCREA(f.n);
  state.creaResults=cr;state.usdaResults=[];state.activeCat=null;
  state.srcTab='crea';
  // Seleziona direttamente
  const src=f.custom?'custom':'crea';
  state.selected={name:f.n,cho100:f.cho,sug100:f.sug,fib100:f.fib,cat:f.c,src};
  state.grams=100;
  render();
  setTimeout(()=>document.getElementById('sarea')?.scrollTo({top:99999,behavior:'smooth'}),80);
}
function onQueryKey(e){
  if(e.key==='Enter'){
    const box=document.getElementById('suggestions');
    if(box) box.innerHTML='';
    doSearch();
  }
}

function doSearch(){
  const q=state.query.trim();
  if(!q)return;
  const box=document.getElementById('suggestions');
  if(box) box.innerHTML='';
  const cr=searchCREA(q);
  state.creaResults=cr;state.usdaResults=[];state.selected=null;state.activeCat=null;
  state.srcTab=cr.length>0?'crea':'usda';
  if(cr.length===0)fetchUSDA(q);
  render();
}

function selectFood(i){
  const foods=state.srcTab==='crea'?state.creaResults:state.usdaResults;
  const f=foods[i];
  const src=f.custom?'custom':(f.src||state.srcTab);
  state.selected={name:f.n,cho100:f.cho,sug100:f.sug,fib100:f.fib,cat:f.c,src};
  state.grams=100;render();
  setTimeout(()=>document.getElementById('sarea')?.scrollTo({top:99999,behavior:'smooth'}),80);
}

function selectFoodDirect(i,mode){
  let f;
  if(mode==='cat'){
    const cat=CATS.find(c=>c.id===state.activeCat);
    const list=[...state.custom.filter(f=>cat.keywords.includes(f.c)).map(f=>({...f,custom:true})),...catFoods(cat)];
    f=list[i];
  }
  if(!f)return;
  const src=f.custom?'custom':'crea';
  state.selected={name:f.n,cho100:f.cho,sug100:f.sug,fib100:f.fib,cat:f.c,src};
  state.grams=100;render();
  setTimeout(()=>document.getElementById('sarea')?.scrollTo({top:99999,behavior:'smooth'}),80);
}

function selectFav(i){
  const f=state.favs[i];
  state.selected={name:f.n,cho100:f.cho,sug100:f.sug,fib100:f.fib,cat:f.c||'',src:f.src||'crea'};
  state.grams=100;state.tab='cerca';render();
}

function setGrams(g){state.grams=g;render();}
function onSlider(e){state.grams=Number(e.target.value);render();}
function onGramNum(e){state.grams=Math.max(1,Number(e.target.value)||1);render();}

function copyCHO(){
  const f=state.selected;if(!f)return;
  const cho=calcFor(f.cho100,state.grams);
  const fib=calcFor(f.fib100,state.grams);
  const net=cho!=null&&fib!=null?Math.max(0,cho-fib):cho;
  const val=fmt(net??cho,1);
  navigator.clipboard.writeText(val).then(()=>{
    state.copied=true;render();setTimeout(()=>{state.copied=false;render();},2500);
  }).catch(()=>showToast('CHO: '+val+'g'));
}

function copyMealCHO(){
  const tot=state.meal.reduce((a,i)=>a+(i.netcho??i.cho),0);
  const val=fmt(tot,1);
  navigator.clipboard.writeText(val).then(()=>{
    state.copied=true;render();setTimeout(()=>{state.copied=false;render();},2500);
    showToast('✓ '+val+'g CHO copiati');
  }).catch(()=>showToast('CHO pasto: '+val+'g'));
}

function addToMeal(){
  const f=state.selected;if(!f)return;
  const cho=calcFor(f.cho100,state.grams);
  const fib=calcFor(f.fib100,state.grams);
  const sug=calcFor(f.sug100,state.grams);
  const net=cho!=null&&fib!=null?Math.max(0,cho-fib):cho;
  const nome=f.name;
  state.meal.push({name:nome,grams:state.grams,cho,sug,fib,netcho:net,src:f.src});
  saveToStorage();
  state.query='';state.creaResults=[];state.usdaResults=[];
  state.selected=null;state.grams=100;state.activeCat=null;
  showToast('✓ '+nome+' aggiunto al pasto');render();
}

function removeMealItem(i){state.meal.splice(i,1);saveToStorage();render();}
function clearMeal(){state.confirmClear=true;render();}
function doClearMeal(){state.meal=[];state.confirmClear=false;saveToStorage();showToast('Pasto azzerato');render();}

function toggleFav(){
  const f=state.selected;if(!f)return;
  const idx=state.favs.findIndex(fv=>fv.n===f.name);
  if(idx>=0){state.favs.splice(idx,1);showToast('Rimosso dai preferiti');}
  else{state.favs.push({n:f.name,c:f.cat||'',cho:f.cho100,sug:f.sug100,fib:f.fib100,src:f.src});showToast('⭐ Salvato nei preferiti');}
  saveToStorage();render();
}
function removeFav(e,i){e.stopPropagation();state.favs.splice(i,1);saveToStorage();render();}

function onFormInput(field,e){state.addForm[field]=e.target.value;state.addForm.error='';}

function saveCustomFood(){
  const f=state.addForm;
  const name=f.name.trim();
  if(!name){state.addForm.error='Inserisci il nome.';render();return;}
  const cho=parseFloat(f.cho);
  if(isNaN(cho)||cho<0||cho>100){state.addForm.error='Carboidrati non validi (0–100g).';render();return;}
  const sug=parseFloat(f.sug)||0;
  const fib=parseFloat(f.fib)||0;
  if(state.custom.some(c=>c.n.toLowerCase()===name.toLowerCase())){
    state.addForm.error='Hai già un alimento con questo nome.';render();return;
  }
  state.custom.unshift({n:name,c:'Personale',cho,sug,fib});
  saveToStorage();
  state.addForm={name:'',cho:'',sug:'',fib:'',error:''};
  showToast('✓ '+name+' aggiunto');render();
}

function removeCustomFood(i){
  const nome=state.custom[i].n;
  state.custom.splice(i,1);saveToStorage();showToast(nome+' eliminato');render();
}

// ── INIT ──
loadFromStorage();
render();
</script>
</body>
</html>
