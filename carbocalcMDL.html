<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CarbOCalc"/>
<meta name="theme-color" content="#0F6E56"/>
<title>CarbOCalc — Omnipod 5</title>
<style>
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-mid:#9FE1CB;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --bg:#F5F5F5;--card:#fff;--text:#1a1a1a;--sub:#6b6b6b;--border:#e0e0e0;
  --red:#E24B4A;--amber:#BA7517;--amber-light:#FAEEDA;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111;--card:#1e1e1e;--text:#f0f0f0;--sub:#999;--border:#333;
    --green-light:#0a3326;--blue-light:#0a1f38;--amber-light:#2a1f07}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;overflow:hidden}
#root{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg)}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:0.5px solid var(--border);
  padding:calc(var(--safe-top) + 12px) 16px 12px;flex-shrink:0;z-index:20}
.topbar-brand{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.brand-name{font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--sub)}
.brand-badge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:10px;
  background:var(--green-light);color:var(--green-dark);font-weight:600;letter-spacing:.04em}
.search-row{display:flex;gap:8px}
.search-input{flex:1;padding:12px 14px;font-size:16px;border:0.5px solid var(--border);
  border-radius:14px;background:var(--bg);color:var(--text);outline:none;
  -webkit-appearance:none;transition:border-color .15s,box-shadow .15s}
.search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
.search-btn{padding:12px 18px;border-radius:14px;border:none;
  background:var(--green);color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;min-width:84px;display:flex;align-items:center;justify-content:center;gap:6px}
.search-btn:active{opacity:.8;transform:scale(.97)}
.search-btn:disabled{background:var(--green-mid);cursor:default}
.source-tabs{display:flex;gap:6px;margin-top:10px}
.stab{flex:1;padding:7px;border-radius:10px;border:0.5px solid var(--border);
  background:var(--bg);font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;text-align:center}
.stab.active{background:var(--green-light);border-color:var(--green);color:var(--green-dark)}

/* BOTTOM NAV */
.bottomnav{display:flex;background:var(--card);border-top:0.5px solid var(--border);
  padding-bottom:var(--safe-bot);flex-shrink:0;z-index:20}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;gap:4px;cursor:pointer;border:none;background:transparent;
  color:var(--sub);font-size:10px;font-weight:600;letter-spacing:.04em;transition:color .12s}
.bnav-btn.active{color:var(--green)}
.bnav-icon{width:24px;height:24px;position:relative}
.bnav-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;
  border-radius:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 3px}

/* SCROLL AREA */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* FOOD CARDS */
.section-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--sub);
  padding:14px 16px 6px;text-transform:uppercase}
.food-card{background:var(--card);margin:0 16px 8px;border-radius:14px;
  border:0.5px solid var(--border);padding:13px 14px;cursor:pointer;
  transition:border-color .1s,transform .1s}
.food-card:active{transform:scale(.98);background:var(--bg)}
.food-card.selected{border:2px solid var(--green);background:var(--green-light)}
.food-card.selected .fc-name{color:var(--green-dark)}
.fc-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.3}
.fc-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:7px}
.b-cho{background:var(--green-light);color:var(--green-dark)}
.b-sug{background:var(--blue-light);color:var(--blue)}
.b-fib{background:#f0f0f0;color:#555}
.b-src-crea{background:var(--green-light);color:var(--green-dark);margin-left:auto}
.b-src-usda{background:var(--amber-light);color:var(--amber);margin-left:auto}
.b-src-custom{background:#FBEAF0;color:#993556;margin-left:auto}
@media(prefers-color-scheme:dark){.b-fib{background:#2a2a2a;color:#aaa}}

/* RESULT PANEL */
.result-panel{background:var(--card);border-top:0.5px solid var(--border);
  padding:14px 16px;flex-shrink:0;z-index:10}
.sel-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sel-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;flex:1}
.quick-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px}
.quick-row::-webkit-scrollbar{display:none}
.qbtn{padding:8px 13px;border-radius:10px;border:0.5px solid var(--border);
  background:var(--bg);color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;flex-shrink:0}
.qbtn:active{transform:scale(.95)}
.qbtn.active{background:var(--green);border-color:var(--green);color:#fff}
.gram-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.gram-lbl{font-size:13px;color:var(--sub);width:38px;flex-shrink:0}
.gram-slider{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;
  background:var(--border);outline:none}
.gram-slider::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;
  border-radius:50%;background:var(--green);cursor:pointer;
  border:3px solid var(--card);box-shadow:0 0 0 1.5px var(--green)}
.gram-num{width:62px;padding:8px 4px;font-size:18px;font-weight:700;text-align:center;
  border:0.5px solid var(--border);border-radius:10px;background:var(--bg);
  color:var(--text);font-variant-numeric:tabular-nums;outline:none;-webkit-appearance:none}
.gram-g{font-size:14px;color:var(--sub)}
.metrics-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.met-box{background:var(--bg);border-radius:11px;padding:10px 10px 9px}
.met-box.big{background:var(--green-light)}
.met-lbl{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--sub);
  text-transform:uppercase;margin-bottom:3px}
.met-lbl.green{color:var(--green-dark)}
.met-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);line-height:1}
.met-val.green{color:var(--green)}
.met-val.blue{color:var(--blue)}
.met-unit{font-size:12px;font-weight:400;margin-left:1px;color:var(--sub)}
.met-sub{font-size:10px;color:var(--green);margin-top:2px}
.panel-btns{display:flex;gap:8px;align-items:stretch}
.btn-copy{padding:11px 14px;border-radius:13px;border:0.5px solid var(--border);
  background:var(--bg);color:var(--sub);font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.btn-copy:active{opacity:.8;transform:scale(.97)}
.btn-copy.done{background:var(--green-light);border-color:var(--green);color:var(--green-dark)}
.btn-add{flex:1;padding:14px;border-radius:13px;border:none;
  background:var(--green-dark);color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px}
.btn-add:active{opacity:.85;transform:scale(.98)}
.btn-fav{padding:11px 13px;border-radius:13px;border:0.5px solid var(--border);
  background:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-fav:active{transform:scale(.95)}

/* MEAL SCREEN */
.meal-total-card{margin:16px;background:var(--green-dark);border-radius:18px;padding:20px}
.mt-lbl{font-size:12px;font-weight:700;letter-spacing:.07em;color:rgba(255,255,255,.7);margin-bottom:6px}
.mt-val{font-size:56px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
.mt-unit{font-size:20px;font-weight:400;color:rgba(255,255,255,.8)}
.mt-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:5px}
.mt-actions{display:flex;gap:8px;margin-top:14px}
.mt-btn{flex:1;padding:10px;border-radius:10px;border:none;
  background:rgba(255,255,255,.18);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.mt-btn:active{background:rgba(255,255,255,.28)}
.mt-btn.danger{background:rgba(255,80,80,.25)}
.meal-item{background:var(--card);margin:0 16px 8px;border-radius:14px;
  border:0.5px solid var(--border);padding:13px 14px;
  display:flex;align-items:center;gap:12px}
.mi-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.mi-grams{font-size:12px;color:var(--sub);margin-top:2px}
.mi-cho{font-size:20px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;white-space:nowrap}
.mi-del{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);
  color:var(--sub);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mi-del:active{background:var(--border)}
.empty-meal{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 30px;gap:14px;text-align:center}
.empty-icon{font-size:44px}
.empty-title{font-size:17px;font-weight:700;color:var(--text)}
.empty-sub{font-size:14px;color:var(--sub);line-height:1.6}

/* FAV SCREEN */
.fav-item{background:var(--card);margin:0 16px 8px;border-radius:14px;
  border:0.5px solid var(--border);padding:13px 14px;
  display:flex;align-items:center;gap:10px;cursor:pointer}
.fav-item:active{transform:scale(.98)}
.fi-info{flex:1}
.fi-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.fi-meta{font-size:12px;color:var(--sub)}
.fi-star{font-size:20px;cursor:pointer;padding:6px}

/* SPINNER */
.spinner{display:inline-block;width:16px;height:16px;
  border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;
  border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;padding:50px 24px;gap:14px;text-align:center}

/* MISC */
.no-results{text-align:center;padding:40px 24px;font-size:14px;color:var(--sub);line-height:1.7}
.warn-pill{margin:0 16px 4px;background:var(--amber-light);border-radius:10px;
  padding:8px 12px;font-size:11px;color:var(--amber);line-height:1.5}
.toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%);
  background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:24px;
  font-size:14px;font-weight:600;z-index:100;white-space:nowrap;
  animation:fadeup .3s ease,fadedown .3s ease 1.7s forwards}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadedown{from{opacity:1}to{opacity:0}}

.add-form{background:var(--card);margin:0 16px 12px;border-radius:14px;border:0.5px solid var(--border);padding:16px}
.add-form-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px}
.form-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.form-field{display:flex;flex-direction:column;gap:5px;flex:1}
.form-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--sub);text-transform:uppercase}
.form-input{padding:10px 12px;font-size:15px;border:0.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;width:100%}
.form-input:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(29,158,117,.12)}
.form-num{padding:10px 8px;font-size:15px;border:0.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);outline:none;text-align:center;width:100%;-webkit-appearance:none}
.form-num:focus{border-color:var(--green)}
.btn-save{width:100%;padding:13px;border-radius:12px;border:none;background:var(--green-dark);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-save:active{opacity:.85;transform:scale(.98)}
.form-error{font-size:12px;color:var(--red);margin-top:-4px;margin-bottom:6px}
.custom-item{background:var(--card);margin:0 16px 8px;border-radius:14px;border:0.5px solid var(--border);padding:13px 14px;display:flex;align-items:center;gap:10px}
.ci-info{flex:1}
.ci-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.ci-meta{font-size:12px;color:var(--sub)}
.ci-del{width:34px;height:34px;border-radius:50%;border:none;background:var(--bg);color:var(--sub);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-del:active{background:var(--border)}

.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding-bottom:calc(var(--safe-bot) + 90px)}
.confirm-box{background:var(--card);border-radius:16px;padding:20px;width:calc(100% - 32px);max-width:400px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.confirm-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.confirm-sub{font-size:13px;color:var(--sub);margin-bottom:18px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-btn-cancel{flex:1;padding:13px;border-radius:12px;border:0.5px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;font-weight:600;cursor:pointer}
.confirm-btn-ok{flex:1;padding:13px;border-radius:12px;border:none;background:var(--red);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.confirm-btn-ok:active{opacity:.85}
.confirm-btn-cancel:active{background:var(--border)}

.scan-btn{padding:12px 13px;border-radius:14px;border:0.5px solid var(--border);
  background:var(--bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.scan-btn:active{background:var(--border);transform:scale(.96)}
.scanner-overlay{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column}
.scanner-topbar{padding:calc(var(--safe-top) + 14px) 16px 14px;display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.7)}
.scanner-close{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.scanner-title{font-size:15px;font-weight:700;color:#fff}
.scanner-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:2px}
.scanner-viewport{flex:1;position:relative;overflow:hidden}
.scanner-viewport video{width:100%;height:100%;object-fit:cover}
.scanner-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scanner-box{width:240px;height:160px;border-radius:12px;position:relative}
.scanner-box::before,.scanner-box::after{content:"";position:absolute;width:36px;height:36px;border-color:#fff;border-style:solid}
.scanner-box::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:8px 0 0 0}
.scanner-box::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 8px 0}
.scanner-corner-tr{position:absolute;top:0;right:0;width:36px;height:36px;border-top:3px solid #fff;border-right:3px solid #fff;border-radius:0 8px 0 0}
.scanner-corner-bl{position:absolute;bottom:0;left:0;width:36px;height:36px;border-bottom:3px solid #fff;border-left:3px solid #fff;border-radius:0 0 0 8px}
.scanner-line{position:absolute;left:8px;right:8px;height:2px;background:rgba(29,158,117,.9);border-radius:1px;animation:scanline 2s ease-in-out infinite}
@keyframes scanline{0%{top:16px;opacity:1}50%{top:calc(100% - 16px);opacity:1}100%{top:16px;opacity:1}}
.scanner-status{position:absolute;bottom:0;left:0;right:0;padding:16px;background:rgba(0,0,0,.6);text-align:center;font-size:13px;color:rgba(255,255,255,.85);min-height:52px;display:flex;align-items:center;justify-content:center}
.scanner-result{position:absolute;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:24px}
.scanner-result-box{background:var(--card);border-radius:18px;padding:20px;width:100%;max-width:340px;text-align:center}
.sr-icon{font-size:36px;margin-bottom:10px}
.sr-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.3}
.sr-meta{font-size:13px;color:var(--sub);margin-bottom:14px}
.sr-values{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.sr-val-box{background:var(--bg);border-radius:10px;padding:10px 6px}
.sr-val-lbl{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--sub);text-transform:uppercase;margin-bottom:3px}
.sr-val-num{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.sr-val-num.green{color:var(--green)}
.sr-val-num.blue{color:var(--blue)}
.sr-val-unit{font-size:11px;color:var(--sub)}
.sr-btns{display:flex;gap:8px}
.sr-btn-ok{flex:1;padding:13px;border-radius:12px;border:none;background:var(--green-dark);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.sr-btn-cancel{padding:13px 14px;border-radius:12px;border:0.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── CREA DATABASE eTCA 2019 ──────────────────────────────────────────────────
const CREA=[
  // CEREALI E DERIVATI
  {n:"Pane bianco",c:"Cereali",cho:56.8,sug:1.5,fib:3.2},
  {n:"Pane integrale",c:"Cereali",cho:48.5,sug:2.1,fib:6.5},
  {n:"Pane di segale",c:"Cereali",cho:49.1,sug:1.8,fib:5.8},
  {n:"Pane tipo rosetta / ciabatta",c:"Cereali",cho:57.5,sug:1.8,fib:3.0},
  {n:"Pane al malto",c:"Cereali",cho:53.8,sug:4.2,fib:3.5},

  {n:"Crackers integrali",c:"Cereali",cho:62.0,sug:3.0,fib:6.5},
  {n:"Fette biscottate",c:"Cereali",cho:76.2,sug:6.0,fib:3.6},
  {n:"Fette biscottate integrali",c:"Cereali",cho:68.0,sug:5.0,fib:7.2},
  {n:"Pasta secca (cruda)",c:"Cereali",cho:74.1,sug:2.0,fib:2.7},
  {n:"Pasta integrale (cruda)",c:"Cereali",cho:69.5,sug:2.2,fib:8.9},
  {n:"Pasta cotta",c:"Cereali",cho:26.0,sug:0.5,fib:1.0},
  {n:"Pasta integrale (cotta)",c:"Cereali",cho:23.5,sug:0.5,fib:3.8},
  {n:"Spaghetti (cotti)",c:"Cereali",cho:27.2,sug:0.6,fib:1.2},
  {n:"Pennette / rigatoni (cotti)",c:"Cereali",cho:26.5,sug:0.5,fib:1.1},
  {n:"Lasagne (pasta cruda)",c:"Cereali",cho:74.0,sug:2.0,fib:2.7},
  {n:"Tagliatelle (crude)",c:"Cereali",cho:68.3,sug:3.2,fib:2.5},
  {n:"Tagliatelle (cotte)",c:"Cereali",cho:24.5,sug:1.2,fib:1.0},
  {n:"Gnocchi di patate",c:"Cereali",cho:23.5,sug:0.6,fib:1.8},

function searchCREA(q){
  const t=q.trim().toLowerCase();
  if(!t)return[];
  const words=t.split(/\s+/);
  const matchFn=f=>{const name=f.n.toLowerCase();return words.every(w=>name.includes(w));};
  const sort=(a,b)=>{
    // Alimenti personalizzati prima
    const aCustom=!!a.custom, bCustom=!!b.custom;
    if(aCustom&&!bCustom)return-1;if(bCustom&&!aCustom)return 1;
    const ai=a.n.toLowerCase().indexOf(t),bi=b.n.toLowerCase().indexOf(t);
    if(ai===0&&bi!==0)return-1;if(bi===0&&ai!==0)return 1;
    return a.n.localeCompare(b.n,"it");
  };
  const creaMapped=CREA.filter(matchFn);
  const customMapped=state.custom
    .filter(matchFn)
    .map(f=>({...f,custom:true}));
  return [...customMapped,...creaMapped].sort(sort);
}

function fmt(v,d=1){
  if(v==null)return"—";
  const n=parseFloat((v).toFixed(d));
  return n%1===0?String(n):n.toFixed(d);
}
function calcFor(v100,g){
  if(v100==null)return null;
  return v100*g/100;
}

// ─── APP STATE ────────────────────────────────────────────────────────────────
let state={
  tab:"cerca",
  query:"",
  creaResults:[],
  usdaResults:[],
  srcTab:"crea",
  searching:false,
  selected:null,
  grams:100,
  meal:[],    // [{name,cho,fib,sug,grams,src}]
  favs:[],    // [{n,c,cho,sug,fib,src}]
  custom:[],  // alimenti personali
  addForm:{name:"",cho:"",sug:"",fib:"",error:""},
  toast:null,
  copied:false,
  confirmClear:false,
  scannerActive:false,
  scannerStatus:"",
};

function loadFromStorage(){
  try{
    const m=localStorage.getItem("cc_meal");
    const f=localStorage.getItem("cc_favs");
    const c=localStorage.getItem("cc_custom");
    if(m)state.meal=JSON.parse(m);
    if(f)state.favs=JSON.parse(f);
    if(c)state.custom=JSON.parse(c);
  }catch(e){}
}
function saveToStorage(){
  try{
    localStorage.setItem("cc_meal",JSON.stringify(state.meal));
    localStorage.setItem("cc_favs",JSON.stringify(state.favs));
    localStorage.setItem("cc_custom",JSON.stringify(state.custom));
  }catch(e){}
}

function showToast(msg){
  state.toast=msg;
  render();
  setTimeout(()=>{state.toast=null;render();},2200);
}

function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ─── EVENT HANDLERS ──────────────────────────────────────────────────────────
function setTab(t){state.tab=t;render();}
function setSrcTab(t){
  state.srcTab=t;
  if(t==="usda"&&state.usdaResults.length===0&&!state.searching&&state.query)
    fetchUSDA(state.query);
  render();
}

function onQueryInput(e){
  state.query=e.target.value;
  if(!state.query.trim()){state.creaResults=[];state.usdaResults=[];state.selected=null;}
  // Aggiorna solo il bottone senza ricostruire il DOM (evita perdita focus su iOS)
  const btn=document.getElementById('sbtn');
  if(btn) btn.disabled=!state.query.trim()||state.searching;
}
function onQueryKey(e){if(e.key==="Enter")doSearch();}

function doSearch(){
  const q=state.query.trim();
  if(!q)return;
  const cr=searchCREA(q);
  state.creaResults=cr;
  state.usdaResults=[];
  state.selected=null;
  state.srcTab=cr.length>0?"crea":"usda";
  if(cr.length===0)fetchUSDA(q);
  render();
}

  "cioccolato":"chocolate","miele":"honey","zucchero":"sugar","marmellata":"jam",
  "nutella":"hazelnut spread","gelato":"ice cream","tiramisù":"tiramisu",
  "tiramisu":"tiramisu","biscotti":"cookies","cornetto":"croissant","brioche":"brioche",
  "pandoro":"pandoro","panettone":"panettone","torta":"cake","crostata":"tart",
  "panna cotta":"panna cotta","budino":"pudding","arachidi":"peanuts",
  "mandorle":"almonds","noci":"walnuts","nocciole":"hazelnuts","pistacchi":"pistachios",
  "anacardi":"cashews","semi di chia":"chia seeds","olio":"olive oil",
  "aceto":"vinegar","ketchup":"ketchup","maionese":"mayonnaise",
  "patatine":"potato chips","popcorn":"popcorn","farina":"flour",
  "piadina":"flatbread","corn flakes":"corn flakes","muesli":"muesli",
  "fiocchi d'avena":"oats","fette biscottate":"melba toast",
};

function translateToEng(q){
  const t=q.trim().toLowerCase();
  // Cerca corrispondenza esatta prima
  if(ITA_ENG[t]) return ITA_ENG[t];
  // Cerca corrispondenza parziale (prima parola chiave trovata)
  for(const [ita,eng] of Object.entries(ITA_ENG)){
    if(t.includes(ita)||ita.includes(t)) return eng;
  }
  // Nessuna traduzione: usa il termine italiano direttamente
  // (USDA a volte riconosce termini italiani comuni)
  return t;
}

async function fetchUSDA(q){
  state.searching=true;render();
  try{
    const eng=translateToEng(q);
    const u=await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(eng)}&api_key=DEMO_KEY&dataType=Foundation,SR%20Legacy&pageSize=10`);
    const ud=await u.json();
    state.usdaResults=(ud.foods||[]).map(f=>{
      function nn(ids){for(const id of ids){const x=(f.foodNutrients||[]).find(n=>n.nutrientId===id||n.nutrientNumber===String(id));if(x&&x.value!=null)return parseFloat(x.value)||0;}return null;}
      return{n:f.description,c:f.foodCategory||"",cho:nn([1005]),sug:nn([2000,269]),fib:nn([1079]),src:"usda"};
    }).filter(f=>f.cho!=null);
    if(state.usdaResults.length>0) state.srcTab="usda";
  }catch(e){
    state.usdaResults=[];
  }
  state.searching=false;render();
}

function selectFood(i){
  const foods=state.srcTab==="crea"?state.creaResults:state.usdaResults;
  const f=foods[i];
  state.selected={name:f.n,cho100:f.cho,sug100:f.sug,fib100:f.fib,cat:f.c,src:state.srcTab};
  state.grams=100;
  render();
  setTimeout(()=>document.getElementById("sarea")?.scrollTo({top:99999,behavior:"smooth"}),80);
}

function selectFav(i){
  const f=state.favs[i];
  const src=f.custom?"custom":(f.src||state.srcTab);
  state.selected={name:f.n,cho100:f.cho,sug100:f.sug,fib100:f.fib,cat:f.c,src};
  state.grams=100;state.tab="cerca";render();
}

function setGrams(g){state.grams=g;render();}
function onSlider(e){state.grams=Number(e.target.value);render();}
function onGramNum(e){const v=Math.max(1,Number(e.target.value)||1);state.grams=v;render();}

function copyCHO(){
  const f=state.selected;if(!f)return;
  const cho=calcFor(f.cho100,state.grams);
  const fib=calcFor(f.fib100,state.grams);
  const net=cho!=null&&fib!=null?Math.max(0,cho-fib):cho;
  const val=fmt(net??cho,1);
  navigator.clipboard.writeText(val).then(()=>{
    state.copied=true;render();
    setTimeout(()=>{state.copied=false;render();},2500);
  }).catch(()=>showToast("Copia manuale: "+val+" g"));
}

function copyMealCHO(){
  const tot=state.meal.reduce((a,i)=>a+(i.netcho??i.cho),0);
  const val=fmt(tot,1);
  navigator.clipboard.writeText(val).then(()=>{
    state.copied=true;render();setTimeout(()=>{state.copied=false;render();},2500);
    showToast("✓ "+val+"g CHO copiati");
  }).catch(()=>showToast("CHO pasto: "+val+"g"));
}

function addToMeal(){
  const f=state.selected;if(!f)return;
  const cho=calcFor(f.cho100,state.grams);
  const fib=calcFor(f.fib100,state.grams);
  const sug=calcFor(f.sug100,state.grams);
  const net=cho!=null&&fib!=null?Math.max(0,cho-fib):cho;
  state.meal.push({name:f.name,grams:state.grams,cho,sug,fib,netcho:net,src:f.src});
  saveToStorage();
  const nome=f.name;
  state.query="";state.creaResults=[];state.usdaResults=[];
  state.selected=null;state.grams=100;
  showToast("✓ "+nome+" aggiunto al pasto");render();
}

function removeMealItem(i){state.meal.splice(i,1);saveToStorage();render();}
function clearMeal(){state.confirmClear=true;render();}
function doClearMeal(){state.meal=[];state.confirmClear=false;saveToStorage();showToast("Pasto azzerato");render();}

function toggleFav(){
  const f=state.selected;if(!f)return;
  const idx=state.favs.findIndex(fv=>fv.n===f.name);
  if(idx>=0){state.favs.splice(idx,1);showToast("Rimosso dai preferiti");}
  else{state.favs.push({n:f.name,c:f.cat||"",cho:f.cho100,sug:f.sug100,fib:f.fib100,src:f.src});showToast("⭐ Salvato nei preferiti");}
  saveToStorage();render();
}

function removeFav(e,i){e.stopPropagation();state.favs.splice(i,1);saveToStorage();render();}

function onFormInput(field,e){state.addForm[field]=e.target.value;state.addForm.error="";render();}

function saveCustomFood(){
  const f=state.addForm;
  const name=f.name.trim();
  if(!name){state.addForm.error="Inserisci il nome dell'alimento.";render();return;}
  const cho=parseFloat(f.cho);
  if(isNaN(cho)||cho<0||cho>100){state.addForm.error="Carboidrati non validi (0–100g).";render();return;}
  const sug=parseFloat(f.sug)||0;
  const fib=parseFloat(f.fib)||0;
  if(state.custom.some(c=>c.n.toLowerCase()===name.toLowerCase())){
    state.addForm.error="Hai già un alimento con questo nome.";render();return;
  }
  state.custom.unshift({n:name,c:"Personale",cho,sug,fib});
  saveToStorage();
  state.addForm={name:"",cho:"",sug:"",fib:"",error:""};
  showToast("✓ "+name+" aggiunto ai tuoi alimenti");
  render();
}

function removeCustomFood(i){
  const nome=state.custom[i].n;
  state.custom.splice(i,1);
  saveToStorage();
  showToast(nome+" eliminato");
  render();
}

// ─── BARCODE SCANNER ─────────────────────────────────────────────────────────
let scannerStream=null;
let scannerTimer=null;

async function startScanner(){
  state.scannerActive=true;
  state.scannerResult=null;
  state.scannerStatus="Avvio fotocamera…";
  render();
  setTimeout(async()=>{
    try{
      const video=document.getElementById('scanner-video');
      if(!video)return;
      scannerStream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}
      });
      video.srcObject=scannerStream;
      await video.play();
      state.scannerStatus="Inquadra il barcode del prodotto…";
      render();
      // Usa BarcodeDetector nativo (iOS 17+, Chrome) oppure fallback foto
      if('BarcodeDetector' in window){
        startNativeScanner();
      } else {
        // Fallback: scatta foto e analizza
        state.scannerStatus="Tocca il pulsante per scansionare il barcode";
        render();
        startCanvasFallback();
      }
    }catch(err){
      state.scannerStatus="Fotocamera non disponibile o permesso negato.";
      render();
    }
  },150);
}

function startNativeScanner(){
  const detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','qr_code']});
  if(scannerTimer)clearInterval(scannerTimer);
  scannerTimer=setInterval(async()=>{
    const video=document.getElementById('scanner-video');
    if(!video||video.readyState<2||video.paused)return;
    try{
      const barcodes=await detector.detect(video);
      if(barcodes&&barcodes.length>0){
        clearInterval(scannerTimer);scannerTimer=null;
        lookupBarcode(barcodes[0].rawValue);
      }
    }catch(e){}
  },400);
}

function startCanvasFallback(){
  // Scansione continua via canvas ogni 600ms
  const canvas=document.getElementById('scanner-canvas');
  if(scannerTimer)clearInterval(scannerTimer);
  scannerTimer=setInterval(async()=>{
    const video=document.getElementById('scanner-video');
    if(!video||video.readyState<2)return;
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(video,0,0);
    // Prova BarcodeDetector sull'immagine statica
    if('BarcodeDetector' in window){
      try{
        const detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','qr_code']});
        const blob=await new Promise(r=>canvas.toBlob(r,'image/jpeg',0.9));
        const img=await createImageBitmap(blob);
        const barcodes=await detector.detect(img);
        if(barcodes&&barcodes.length>0){
          clearInterval(scannerTimer);scannerTimer=null;
          lookupBarcode(barcodes[0].rawValue);
        }
      }catch(e){}
    }
  },600);
}

async function lookupBarcode(barcode){
  state.scannerStatus="Codice rilevato: "+barcode+"  —  Ricerca prodotto…";
  render();
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const d=await r.json();
    if(d.status===1&&d.product){
      const p=d.product;
      const n=d.product.nutriments||{};
      const cho=parseFloat(n['carbohydrates_100g'])||null;
      const sug=parseFloat(n['sugars_100g'])||null;
      const fib=parseFloat(n['fiber_100g'])||null;
      const net=cho!=null&&fib!=null?Math.max(0,cho-fib):cho;
      const name=p.product_name_it||p.product_name||p.product_name_en||"Prodotto sconosciuto";
      const brand=p.brands||"";
      if(cho==null){
        state.scannerResult={error:"Prodotto trovato ma senza valori nutrizionali. Aggiungilo manualmente nella scheda I miei."};
      }else{
        state.scannerResult={name,brand,cho,sug,fib,net};
      }
    }else{
      state.scannerResult={error:"Prodotto non trovato nel database Open Food Facts. Aggiungilo manualmente nella scheda I miei."};
    }
  }catch(e){
    state.scannerResult={error:"Errore di rete. Controlla la connessione e riprova."};
  }
  render();
}

function retryScanner(){
  state.scannerResult=null;
  state.scannerStatus="Inquadra il barcode del prodotto…";
  render();
  if('BarcodeDetector' in window){
    startNativeScanner();
  } else {
    startCanvasFallback();
  }
}

function stopScanner(){
  if(scannerTimer){clearInterval(scannerTimer);scannerTimer=null;}
  if(scannerStream){scannerStream.getTracks().forEach(t=>t.stop());scannerStream=null;}
  state.scannerActive=false;
  state.scannerResult=null;
  state.scannerStatus="";
  render();
}

function useScanResult(){
  const sr=state.scannerResult;
  if(!sr||sr.error)return;
  stopScanner();
  state.selected={
    name:sr.name,
    cho100:sr.cho,
    sug100:sr.sug,
    fib100:sr.fib,
    cat:sr.brand||"Barcode",
    src:"barcode"
  };
  state.grams=100;
  state.tab="cerca";
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadFromStorage();
render();
